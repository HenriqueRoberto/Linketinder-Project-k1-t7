<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linketinder</title>
    <link rel="stylesheet" href="./assets/css/global.css" />
    <link rel="stylesheet" href="./assets/css/app.css" />
    <link rel="stylesheet" href="./assets/css/app-profile.css" />
    <link rel="stylesheet" href="./assets/css/app-match-view.css" />
    <link rel="stylesheet" href="./assets/css/utils.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
  </head>
  <body>
    <div class="container">
      <main>
        <img id="log-out" src="./assets/img/log-out.png" alt="" />
        <!-- tela logada com candidato -->
        <section class="menu-nav hidden" id="menu-nav-candidato">
          <nav>
            <ul class="nav-links">
              <li>
                <a href="#" id="nav-job">
                  <img src="assets/img/job.png" alt="" />
                </a>
              </li>
              <li>
                <a href="#" id="nav-match">
                  <img src="assets/img/match.png" alt="" />
                </a>
              </li>
              <li>
                <a href="#" id="nav-user">
                  <img src="assets/img/user.png" alt="" />
                </a>
              </li>
            </ul>
          </nav>
        </section>

        <section class="profile-candidato hidden" id="profile-candidato">
          <div class="card">
            <div class="header-card">
              <div class="foto-candidato" id="foto-candidato"></div>

              <input
                type="file"
                id="input-foto"
                accept="image/*"
                class="hidden"
              />

              <h2 id="nome-perfil-candidato">Nome do Candidato</h2>
              <span class="bar-orange-35"></span>
            </div>

            <div class="dados-candidato">
              <div class="group-dados-candidato">
                <label for="nome-candidato">Nome</label>
                <input
                  type="text"
                  id="nome-candidato"
                  placeholder="Digite o nome do candidato"
                  pattern="^[A-Za-zÀ-ÿ\s]+$"
                  title="Digite apenas letras e espaços"
                  required
                />
              </div>

              <div class="group-dados-candidato">
                <label for="email-candidato">Email</label>
                <input
                  type="email"
                  id="email-candidato"
                  placeholder="Digite o email do candidato"
                  pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                  title="Email inválido. Ex: nome@email.com"
                  required
                />
              </div>

              <div class="group-dados-candidato">
                <label for="cpf-candidato">CPF</label>
                <input
                  type="text"
                  id="cpf-candidato"
                  placeholder="Digite o CPF do candidato"
                  pattern="^\d{3}\.\d{3}\.\d{3}-\d{2}$"
                  title="Formato: 000.000.000-00"
                  required
                />
              </div>

              <div class="group-dados-candidato">
                <label for="idade-candidato">Idade</label>
                <input
                  type="number"
                  id="idade-candidato"
                  placeholder="Digite a idade do candidato"
                  min="0"
                  max="120"
                  title="Digite uma idade válida (0 a 120)"
                  required
                />
              </div>

              <div class="group-dados-candidato">
                <label for="estado-candidato">Estado</label>
                <input
                  type="text"
                  id="estado-candidato"
                  placeholder="Digite o estado"
                  pattern="^[A-Za-zÀ-ÿ]+(?:[ -][A-Za-zÀ-ÿ]+)*$"
                  title="Digite o nome do estado"
                  required
                />
              </div>

              <div class="group-dados-candidato">
                <label for="cep-candidato">CEP</label>
                <input
                  type="text"
                  id="cep-candidato"
                  placeholder="Digite o CEP"
                  pattern="^\d{5}-\d{3}$"
                  title="Formato: 00000-000"
                  required
                />
              </div>

              <div class="group-dados-candidato">
                <label for="descricao-candidato">Descrição</label>
                <textarea id="descricao-candidato"></textarea>
              </div>

              <div class="group-dados-candidato">
                <label for="senha-atual">Senha atual</label>
                <div class="input-senha">
                  <input type="password" id="senha-atual" />
                  <button type="button" id="toggle-senha-atual">👁</button>
                </div>
              </div>

              <div class="group-dados-candidato">
                <label for="nova-senha">Nova senha</label>
                <div class="input-senha">
                  <input type="password" id="nova-senha" />
                  <button
                    type="button"
                    id="toggle-nova-senha"
                    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}"
                    title="Mínimo 6 caracteres, com maiúscula, minúscula, número e símbolo"
                  >
                    👁
                  </button>
                </div>
              </div>
            </div>

            <div class="competencias">
              <button class="btn" id="btn-add-competencia">
                Adicionar competência
              </button>

              <div class="lista-competencias" id="lista-competencias"></div>

              <!-- template invisível -->
              <div
                class="competencia-template hidden"
                id="competencia-template"
              >
                <span class="competencia-texto">Categoria</span>
              </div>
            </div>
            <button class="btn" id="btn-salvar-candidato">Salvar</button>
            <button id="btn-excluir-conta-candidato">Excluir conta</button>
          </div>

          <div id="popup-competencia" class="popup hidden">
            <div class="popup-content">
              <h3>Adicionar competência</h3>

              <input
                type="text"
                id="input-competencia"
                placeholder="Digite a competência"
              />

              <div class="popup-actions">
                <button id="cancelar-competencia">Cancelar</button>
                <button id="confirmar-competencia">Adicionar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- compartilhado -->

        <section class="match-view" id="match-view-section">
          <div class="card">
            <div class="header-card">
              <h2>Matches</h2>
              <span class="bar-orange-30"></span>
            </div>
            <div class="match-list" id="match-list">
              <!-- Matches serão adicionados aqui dinamicamente -->
              <div class="match-item hidden">
                <span>|</span>
                <h3 class="titulo-vaga" id="titulo-vaga"></h3>
                <span class="arrow">▼</span>
              </div>

              <div
                class="drop-empresa-menu-candidato hidden"
                id="drop-empresa-menu-candidato"
              >
                <div id="candidato-list"></div>
              </div>
            </div>

            <div class="card-view hidden" id="view-vaga">
              <div class="header-card-view">
                <h3 class="titulo-card" id="titulo-vaga-card"></h3>

                <button class="btn-fechar-card" id="btn-fechar-card">X</button>
              </div>
              <div class="card-content-view" id="card-content-view">
                <div class="group-dados-vaga">
                  <label for="descricao-vaga">Descrição vaga</label>
                  <textarea id="descricao-vaga" disabled></textarea>
                </div>
                <div class="group-dados-vaga row">
                  <label for="horario-vaga">Horário:</label>
                  <input type="text" id="horario-vaga" disabled />
                </div>
                <div class="group-dados-vaga row">
                  <label for="localizacao-vaga">Localização:</label>
                  <input type="text" id="localizacao-vaga" disabled />
                </div>
                <div class="group-dados-vaga row">
                  <label for="salario-vaga">Remuneração:</label>
                  <input type="text" id="salario-vaga" disabled />
                </div>

                <div class="group-dados-vaga">
                  <label for="requisitos-vaga">Requisitos:</label>
                  <textarea id="requisitos-vaga" disabled></textarea>
                </div>

                <div class="group-dados-vaga">
                  <label for="competencias-vaga">Competencias:</label>
                  <textarea id="competencias-vaga" disabled></textarea>
                </div>
                <!-- gráfico de competências -->
                <div class="grafico-competencias">
                  <canvas id="grafico-competencias"></canvas>
                </div>

                <!-- dados empresa -->
                <div class="empresa-view-dados hidden" id="empresa-view-dados">
                  <div class="group-dados-vaga row">
                    <label for="nome-empresa-match">Nome da empresa:</label>
                    <input type="text" id="nome-empresa-match" disabled />
                  </div>

                  <div class="group-dados-vaga row">
                    <label for="email-empresa-match">Email:</label>
                    <input type="text" id="email-empresa-match" disabled />
                  </div>

                  <div class="group-dados-vaga row">
                    <label for="cnpj-empresa-match">CNPJ:</label>
                    <input type="text" id="cnpj-empresa-match" disabled />
                  </div>

                  <div class="group-dados-vaga">
                    <label for="descricao-empresa-match"
                      >Descrição da empresa:</label
                    >
                    <textarea id="descricao-empresa-match" disabled></textarea>
                  </div>

                  <div class="group-dados-vaga row">
                    <label for="pais-empresa-match">País:</label>
                    <input type="text" id="pais-empresa-match" disabled />
                  </div>

                  <div class="group-dados-vaga row">
                    <label for="estado-empresa-match">Estado:</label>
                    <input type="text" id="estado-empresa-match" disabled />
                  </div>

                  <div class="group-dados-vaga row">
                    <label for="cep-empresa-match">CEP:</label>
                    <input type="text" id="cep-empresa-match" disabled />
                  </div>
                  <!--  -->
                </div>

                <!--  -->
              </div>
            </div>

            <div class="candidato-view-dados hidden" id="candidato-view-dados">
              <div class="card" id="card-candidato-view-match">
                <div class="header-card-view">
                  <h3 class="titulo-card" id="nome-candidato-view"></h3>
                  <button
                    class="btn-fechar-card"
                    id="btn-fechar-card-candidato"
                  >
                    X
                  </button>
                </div>

                <div class="card-content-view" id="card-content-view">
                  <div class="dados-candidato">
                    <div class="group-dados-candidato">
                      <label for="email-candidato-view">Email</label>
                      <input
                        type="email"
                        id="email-candidato-view  "
                        disabled
                      />
                    </div>

                    <div class="group-dados-candidato">
                      <label for="cpf-candidato-view">CPF</label>
                      <input type="text" id="cpf-candidato-view" disabled />
                    </div>

                    <div class="group-dados-candidato">
                      <label for="idade-candidato-view">Idade</label>
                      <input type="number" id="idade-candidato-view" disabled />
                    </div>

                    <div class="group-dados-candidato">
                      <label for="estado-candidato-view">Estado</label>
                      <input type="text" id="estado-candidato-view" disabled />
                    </div>

                    <div class="group-dados-candidato">
                      <label for="cep-candidato-view    ">CEP</label>
                      <input type="text" id="cep-candidato-view" disabled />
                    </div>

                    <div class="group-dados-candidato">
                      <label for="descricao-candidato-view">Descrição</label>
                      <textarea
                        id="descricao-candidato-view"
                        disabled
                      ></textarea>
                    </div>

                    <div
                      class="lista-competencias"
                      id="lista-competencias"
                    ></div>

                    <!-- template invisível -->
                    <div
                      class="competencia-template hidden"
                      id="competencia-template"
                    >
                      <span class="competencia-texto">Categoria</span>
                    </div>
                    <!--  -->
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="match-vagas hidden">
          <div class="card hidden" id="card-sem-vagas">
            <div class="card-vazio">
              <h2>Não há vagas disponíveis</h2>
              <p>:/</p>
            </div>
          </div>
          <div class="card hidden" id="card-sem-candidatos">
            <div class="card-vazio">
              <h2>Não há candidatos disponíveis</h2>
              <p>:/</p>
            </div>
          </div>

          <div class="card-for-match" id="card-for-match">
            <div class="card-match-content">
              <div class="header-card">
                <h2 class="titulo-card" id="titulo-card-match"></h2>
              </div>

              <div class="dados-candidato hidden" id="dados-candidato-match">
                <div class="group-dados-candidato">
                  <label for="descricao-candidato-match">Descrição</label>
                  <textarea id="descricao-candidato-match" disabled></textarea>
                </div>

                <div class="group-dados-candidato">
                  <label for="lista-competencias-match">Competências</label>
                  <!-- prettier-ignore -->
                  <div class="lista-competencias" id="lista-competencias-match"></div>
                </div>

                <!-- prettier-ignore -->
                <div
                  id="competencia-template-vaga"
                  class="competencia-template hidden"
                >
                  <span class="competencia-texto"></span>
                </div>

                <div class="group-dados-candidato">
                  <label for="estado-candidato-match">Estado</label>
                  <input type="text" id="estado-candidato-match" disabled />
                </div>
              </div>

              <div class="dados-vaga hidden" id="dados-vaga-match">
                <div class="group-dados-vaga">
                  <label for="descricao-vaga">Descrição da vaga</label>
                  <textarea id="descricao-vaga-input-match" disabled></textarea>
                </div>
                <div class="group-dados-vaga row">
                  <label for="horario-vaga">Horário:</label>
                  <input type="text" id="horario-vaga-input-match" disabled />
                </div>
                <div class="group-dados-vaga row">
                  <label for="localizacao-vaga">Localização:</label>
                  <input
                    type="text"
                    id="localizacao-vaga-input-match"
                    disabled
                  />
                </div>
                <div class="group-dados-vaga row">
                  <label for="salario-vaga">Remuneração:</label>
                  <input type="text" id="salario-vaga-input-match" disabled />
                </div>
                <div class="group-dados-vaga">
                  <label for="requisitos-vaga">Requisitos:</label>
                  <textarea
                    id="requisitos-vaga-input-match"
                    disabled
                  ></textarea>
                </div>
              </div>
            </div>

            <div class="btn-area-match">
              <img
                src="./assets/img/like.png"
                alt="like"
                class="match-btn like-btn"
                id="like-btn"
              />
              <img
                src="./assets/img/match-not.png"
                alt="x"
                class="match-btn dislike-btn"
                id="dislike-btn"
              />
            </div>
          </div>
        </section>

        <!-- tela logada com empresa -->
        <section class="menu-nav hidden" id="menu-nav-empresa">
          <nav>
            <ul class="nav-links">
              <li>
                <a href="#" id="nav-job-empresa">
                  <img src="assets/img/job.png" alt="" />
                </a>
              </li>
              <li>
                <a href="#" id="nav-vagas-empresa">
                  <img src="assets/img/file.png" alt="" />
                </a>
              </li>
              <li>
                <a href="#" id="nav-match-empresa">
                  <img src="assets/img/match.png" alt="" />
                </a>
              </li>
              <li>
                <a href="#" id="nav-user-empresa">
                  <img src="assets/img/user.png" alt="" />
                </a>
              </li>
            </ul>
          </nav>
        </section>

        <section class="profile-empresa hidden" id="profile-empresa">
          <div class="card">
            <div class="header-card">
              <div class="foto-empresa" id="foto-empresa"></div>

              <input
                type="file"
                accept="image/*"
                class="input-foto hidden"
                id="imagem-perfil-empresa"
              />

              <h2 id="nome-perfil-empresa">Nome da Empresa</h2>
              <span class="bar-orange-35"></span>
            </div>

            <div class="dados-empresa">
              <div class="group-dados-empresa">
                <label>Nome</label>
                <input
                  type="text"
                  id="nome-empresa"
                  pattern="^[A-Za-zÀ-ÿ0-9&.,\- ]+$"
                  title="Use apenas letras, números e caracteres como . , - &"
                  required
                />
              </div>

              <div class="group-dados-empresa">
                <label>Email</label>
                <input
                  type="email"
                  id="email-empresa"
                  pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                  title="Email inválido. Ex: nome@email.com"
                  required
                />
              </div>

              <div class="group-dados-empresa">
                <label>CNPJ</label>
                <input
                  type="text"
                  id="cnpj-empresa"
                  placeholder="Digite o CNPJ"
                  pattern="^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}$"
                  title="Formato: 00.000.000/0000-00"
                  required
                />
              </div>

              <div class="group-dados-empresa">
                <label>País</label>
                <input
                  type="text"
                  id="pais-empresa"
                  placeholder="Digite o país"
                  pattern="^[A-Za-zÀ-ÿ]+(?:\s[A-Za-zÀ-ÿ]+)*$"
                  title="Digite o nome do país (apenas letras)"
                  required
                />
              </div>

              <div class="group-dados-empresa">
                <label>Estado</label>
                <input
                  type="text"
                  id="estado-empresa"
                  placeholder="Digite o estado"
                  pattern="^[A-Za-zÀ-ÿ]+(?:[ -][A-Za-zÀ-ÿ]+)*$"
                  title="Digite o nome do estado"
                  required
                />
              </div>

              <div class="group-dados-empresa">
                <label>CEP</label>
                <input
                  type="text"
                  id="cep-empresa"
                  placeholder="Digite o CEP"
                  pattern="^\d{5}-\d{3}$"
                  title="Formato: 00000-000"
                  required
                />
              </div>

              <div class="group-dados-empresa">
                <label>Descrição</label>
                <textarea
                  class="campo-descricao"
                  id="descricao-empresa"
                ></textarea>
              </div>

              <div class="group-dados-empresa">
                <label>Senha atual</label>
                <div class="input-senha">
                  <input
                    type="password"
                    class="campo-senha-atual"
                    id="senha-atual-empresa"
                  />
                  <button type="button" id="toggle-senha-atual-empresa">
                    👁
                  </button>
                </div>
              </div>

              <div class="group-dados-empresa">
                <label>Nova senha</label>
                <div class="input-senha">
                  <input
                    type="password"
                    class="campo-nova-senha"
                    id="nova-senha-empresa"
                  />
                  <button type="button" id="toggle-nova-senha-empresa">
                    👁
                  </button>
                </div>
              </div>
            </div>

            <button class="btn" id="btn-salvar-empresa">Salvar</button>

            <button id="btn-excluir-conta-empresa">Excluir conta</button>
          </div>
        </section>

        <section class="vagas-empresa hidden" id="vagas-empresa">
          <div class="card" id="card-vagas-empresa">
            <div class="header-card">
              <h2>Minhas Vagas</h2>
              <span class="bar-orange-50"></span>
              <button class="btn" id="btn-add-vaga">Adicionar vaga</button>
            </div>

            <div class="lista-vagas" id="lista-vagas">
              <div class="vaga-item hidden">
                <span>|</span>
                <h3 class="titulo-vaga-empresa" id="titulo-vaga-empresa"></h3>
              </div>
            </div>
          </div>

          <div id="popup-competencia-vaga" class="popup hidden">
            <div class="popup-content">
              <h3>Adicionar competência</h3>

              <input
                type="text"
                id="input-competencia-vaga"
                placeholder="Digite a competência"
              />

              <div class="popup-actions">
                <button type="button" id="confirmar-competencia-vaga">
                  Adicionar
                </button>
                <button type="button" id="cancelar-competencia-vaga">
                  Cancelar
                </button>
              </div>
            </div>
          </div>

          <div class="modal-content hidden" id="modal-add-vaga">
            <h3>Adicionar nova vaga</h3>

            <form action="">
              <div class="group-dados-vaga">
                <input
                  type="text"
                  placeholder="titulo da vaga"
                  id="titulo-vaga-input"
                />
              </div>
              <div class="group-dados-vaga">
                <label for="descricao-vaga">Descrição da vaga</label>
                <textarea id="descricao-vaga-input"></textarea>
              </div>
              <div class="group-dados-vaga row">
                <label for="horario-vaga">Horário:</label>
                <input type="text" id="horario-vaga-input" />
              </div>
              <div class="group-dados-vaga row">
                <label for="localizacao-vaga">Localização:</label>
                <input type="text" id="localizacao-vaga-input" />
              </div>
              <div class="group-dados-vaga row">
                <label for="salario-vaga">Remuneração:</label>
                <input type="text" id="salario-vaga-input" />
              </div>
              <div class="group-dados-vaga">
                <label for="requisitos-vaga">Requisitos:</label>
                <textarea id="requisitos-vaga-input"></textarea>
              </div>

              <div class="competencias">
                <button type="button" class="btn" id="btn-add-competencia-vaga">
                  Adicionar competência
                </button>

                <div
                  class="lista-competencias"
                  id="lista-competencias-vaga"
                ></div>

                <!-- template invisível -->
                <div
                  class="competencia-template hidden"
                  id="competencia-template-vaga"
                >
                  <span class="competencia-texto">Categoria</span>
                </div>
              </div>

              <div class="modal-actions">
                <button id="confirmar-add-vaga">Salvar</button>
                <button type="button" id="cancelar-add-vaga">Cancelar</button>

                <button id="btn-excluir-vaga" type="button">Excluir</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./assets/js/app.js"></script>
    <script type="module" src="./assets/js/ui/MenuPagination.js"></script>
    <script type="module" src="./assets/js/auth/AuthController.js"></script>
    <script type="module" src="./assets/js/auth/AuthService.js"></script>
  </body>
</html>
