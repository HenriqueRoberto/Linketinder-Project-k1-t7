<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linketinder</title>
    <link rel="stylesheet" href="./assets/css/global.css" />
    <link rel="stylesheet" href="./assets/css/auth.css" />
    <link rel="stylesheet" href="./assets/css/utils.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
  </head>
  <body>
    <div class="container">
      <section class="banner-text">
        <h1>LinkeTinder</h1>
        <p>O Jeito Inteligente de Conectar Talentos e Empresas</p>
      </section>
      <main>
        <section class="sec-form">
          <!-- form login -->
          <form id="form-login" class="form-login" action="">
            <h1>Log <span>In</span></h1>
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                title="Email inválido. Ex: nome@email.com"
                placeholder="Digite seu email"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Senha</label>
              <input
                type="password"
                id="password"
                placeholder="Digite sua senha"
                required
              />
            </div>

            <div class="form-group">
              <button type="submit">Login</button>
            </div>

            <div class="form-group form-links">
              <a href="" id="link-empresa">Cadastre-se como empresa</a>
              <a href="" id="link-candidato">Cadastre-se como candidato</a>
            </div>
          </form>
          <!-- form empresa -->
          <form id="form-empresa" class="form-empresa hidden">
            <button type="button" id="back-login-empresa"><</button>

            <h1>Cadastro <span>Empresa</span></h1>

            <div class="form-group">
              <label for="">Nome</label>
              <input
                type="text"
                id="nome-empresa"
                placeholder="Digite o nome da empresa"
                pattern="^[A-Za-zÀ-ÿ0-9&.,\- ]+$"
                title="Use apenas letras, números e caracteres como . , - &"
                required
              />
            </div>
            <div class="form-group">
              <label for="email-empresa">Email</label>
              <input
                type="email"
                id="email-empresa"
                pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                title="Email inválido. Ex: nome@email.com"
                placeholder="Digite o email da empresa"
                required
              />
            </div>
            <div class="form-group">
              <label for="cnpj">CNPJ</label>
              <input
                type="text"
                id="cnpj"
                placeholder="Digite o CNPJ"
                pattern="^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}$"
                title="Formato: 00.000.000/0000-00"
                required
              />
            </div>
            <div class="form-group">
              <label for="pais-empresa">País</label>
              <input
                type="text"
                id="pais-empresa"
                placeholder="Digite o país"
                pattern="^[A-Za-zÀ-ÿ]+(?:\s[A-Za-zÀ-ÿ]+)*$"
                title="Digite o nome do país (apenas letras)"
                required
              />
            </div>
            <div class="form-group">
              <label for="estado-empresa">Estado</label>
              <input
                type="text"
                id="estado-empresa"
                placeholder="Digite o estado"
                pattern="^[A-Za-zÀ-ÿ]+(?:[ -][A-Za-zÀ-ÿ]+)*$"
                title="Digite o nome do estado"
                required
              />
            </div>
            <div class="form-group">
              <label for="cep-empresa">CEP</label>
              <input
                type="text"
                id="cep-empresa"
                placeholder="Digite o CEP"
                pattern="^\d{5}-\d{3}$"
                title="Formato: 00000-000"
                required
              />
            </div>
            <div class="form-group">
              <label for="descricao-empresa">Descrição</label>
              <textarea
                id="descricao-empresa"
                placeholder="Digite a descrição da empresa"
                required
              ></textarea>
            </div>
            <div class="form-group">
              <label for="senha-empresa">Senha</label>
              <input
                type="password"
                id="senha-empresa"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}"
                title="Mínimo 6 caracteres, com maiúscula, minúscula, número e símbolo"
                placeholder="Digite a senha"
                required
              />
            </div>

            <button type="submit">Cadastrar</button>
          </form>
          <!-- form candidato -->
          <form id="form-candidato" class="form-candidato hidden">
            <button type="button" id="back-login-candidato"><</button>
            <h1>Cadastro <span>Candidato</span></h1>

            <div class="form-group">
              <label for="nome-candidato">Nome</label>
              <input
                type="text"
                id="nome-candidato"
                placeholder="Digite o nome do candidato"
                pattern="^[A-Za-zÀ-ÿ\s]+$"
                title="Digite apenas letras e espaços"
                required
              />
            </div>
            <div class="form-group">
              <label for="email-candidato">Email</label>
              <input
                type="email"
                id="email-candidato"
                pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                title="Email inválido. Ex: nome@email.com"
                placeholder="Digite o email do candidato"
                required
              />
            </div>
            <div class="form-group">
              <label for="cpf-candidato">CPF</label>
              <input
                type="text"
                id="cpf-candidato"
                placeholder="Digite o CPF do candidato"
                pattern="^\d{3}\.\d{3}\.\d{3}-\d{2}$"
                title="Formato: 000.000.000-00"
                required
              />
            </div>
            <div class="form-group">
              <label for="idade-candidato">Idade</label>
              <input
                type="number"
                id="idade-candidato"
                placeholder="Digite a idade do candidato"
                min="0"
                max="120"
                title="Digite uma idade válida (0 a 120)"
                required
              />
            </div>
            <div class="form-group">
              <label for="estado-candidato">Estado</label>
              <input
                type="text"
                id="estado-candidato"
                placeholder="Digite o estado"
                pattern="^[A-Za-zÀ-ÿ]+(?:[ -][A-Za-zÀ-ÿ]+)*$"
                title="Digite o nome do estado"
                required
              />
            </div>
            <div class="form-group">
              <label for="cep-candidato">CEP</label>
              <input
                type="text"
                id="cep-candidato"
                placeholder="Digite o CEP"
                pattern="^\d{5}-\d{3}$"
                title="Formato: 00000-000"
              />
            </div>
            <div class="form-group">
              <label for="descricao-candidato">Descrição</label>
              <textarea
                id="descricao-candidato"
                placeholder="Digite a descrição do candidato"
                required
              ></textarea>
            </div>
            <div class="form-group">
              <label for="senha-candidato">Senha</label>
              <input
                type="password"
                id="senha-candidato"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}"
                title="Mínimo 6 caracteres, com maiúscula, minúscula, número e símbolo"
                placeholder="Digite a senha"
                required
              />
            </div>

            <button type="submit">Cadastrar</button>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/js/ui/AuthPagination.js"></script>
    <script type="module" src="./assets/js/auth/AuthController.js"></script>
    <script type="module" src="./assets/js/auth/AuthService.js"></script>
  </body>
</html>
